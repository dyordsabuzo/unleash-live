name: Deploy Infrastructure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  auth:
    name: Deploy Auth (infra/auth)
    concurrency:
      group: deploy-infra-auth
      cancel-in-progress: true
    uses: ./.github/workflows/terraform-deploy.yml
    with:
      directory: infra/auth
      envs: '["prod"]'
      apply: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_DEPLOY_ROLE: ${{ secrets.AWS_DEPLOY_ROLE }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      AWS_EXTERNAL_ID: ${{ secrets.AWS_EXTERNAL_ID }}

  compute:
    name: Deploy Compute (infra/compute)
    needs: auth
    concurrency:
      group: deploy-infra-compute
      cancel-in-progress: true
    uses: ./.github/workflows/terraform-deploy.yml
    with:
      directory: infra/compute
      envs: '["prod-us", "prod-eu"]'
      apply: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_DEPLOY_ROLE: ${{ secrets.AWS_DEPLOY_ROLE }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      AWS_EXTERNAL_ID: ${{ secrets.AWS_EXTERNAL_ID }}

  api-test:
    name: API tests
    runs-on: ubuntu-latest
    needs: [auth, compute]
    strategy:
      matrix:
        env: [prod-us, prod-eu]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (assume-role via IAM user)
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-external-id: ${{ secrets.AWS_EXTERNAL_ID }}
          role-session-name: deployment
          role-skip-session-tagging: true
          aws-region: ${{ secrets.AWS_REGION }}
          role-duration-seconds: 1200

      - name: Setup AWS CLI
        uses: aws-actions/setup-aws-cli@v2
        with:
          version: "2.x"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Fetch test user
        run: |
          TEST_USER_EMAIL=$(aws ssm get-parameter \
            --name /cognito/testuser/EMAIL --region $COGNITO_REGION \
            --query "Parameter.Value" --with-decryption --output text)

          TEST_USER_PASSWORD=$(aws ssm get-parameter \
              --name /cognito/testuser/PASSWORD --region $COGNITO_REGION \
              --query "Parameter.Value" --with-decryption --output text)

          echo "TEST_USER_EMAIL=$TEST_USER_EMAIL" >> $GITHUB_ENV
          echo "TEST_USER_PASSWORD=$TEST_USER_PASSWORD" >> $GITHUB_ENV

      - name: Fetch api token
        working-directory: infra/auth
        env:
          TF_WORKSPACE: prod
          TEST_USER_EMAIL: ${{ env.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ env.TEST_USER_PASSWORD }}
        run: |
          terraform init -upgrade -input=false
          terraform workspace select "${TF_WORKSPACE}"
          COGNITO_USER_POOL_ARN=$(terraform output -raw user_pool_arn)
          COGNITO_USER_POOL=$(terraform output -raw user_pool_id)
          COGNITO_CLIENT_ID=$(terraform output -raw user_pool_client_id)
          COGNITO_REGION=$(terraform output -raw cognito_region)

          COGNITO_TOKEN=$(aws cognito-idp admin-initiate-auth \
            --user-pool-id $COGNITO_USER_POOL --client-id $COGNITO_CLIENT_ID \
            --auth-flow ADMIN_NO_SRP_AUTH \
            --auth-parameters USERNAME=$TEST_USER_EMAIL,PASSWORD=$TEST_USER_PASSWORD \
            --region $COGNITO_REGION \
            --query "AuthenticationResult.IdToken" --output text)

          echo "COGNITO_TOKEN=$COGNITO_TOKEN" >> $GITHUB_ENV

      - name: Fetch api url
        working-directory: infra/compute
        env:
          TF_WORKSPACE: ${{ matrix.env }}
          TEST_USER_EMAIL: ${{ env.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ env.TEST_USER_PASSWORD }}
        run: |
          terraform init -upgrade -input=false
          terraform workspace select "${TF_WORKSPACE}"
          APIGW_INVOKE_URL=$(terraform output -raw apigw_invoke_url)
          REQUEST_REGION=$(terraform output -raw region)
          echo "APIGW_INVOKE_URL=$APIGW_INVOKE_URL" >> $GITHUB_ENV
          echo "REQUEST_REGION=$REQUEST_REGION" >> $GITHUB_ENV

      - name: Run k6 test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: test/k6/testing.js
          flags: --out json=results.json
        env:
          BASE_URL: ${{ env.APIGW_INVOKE_URL }}
          API_TOKEN: ${{ env.COGNITO_TOKEN }}
          REQUEST_REGION: ${{ env.REQUEST_REGION }}
